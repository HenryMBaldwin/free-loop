# prek.toml
default_install_hook_types = ["pre-commit", "commit-msg"]

[[repos]]
repo = "builtin"
hooks = [
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "check-merge-conflict" },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
entry = "sh -c 'cargo fmt --all && git add -u'"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
entry = "cargo clippy --workspace --all-targets --all-features -- -D warnings"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "commitlint"
name = "commitlint"
entry = "commitlint --edit"
language = "system"
stages = ["commit-msg"]
pass_filenames = false
